name: observability

networks:
  obs-net:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  loki-data:

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}

    restart: unless-stopped

    hostname: grafana

    env_file:
      - ./.env

    ports:
      - "${GRAFANA_PORT}:3000"

    networks:
      - obs-net

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

    security_opt:
      - no-new-privileges:true

    logging:
    # Prevent unlimited Docker log growth.
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

    mem_limit: 1g
    cpus: 1


  prometheus:

    image: prom/prometheus:${PROMETHEUS_VERSION}

    hostname: prometheus

    restart: unless-stopped

    ports:
      - "${PROMETHEUS_PORT}:9090"

    command:
      - --web.enable-otlp-receiver
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      # - "--config.file=/etc/prometheus/prometheus.yml"
      # - "--storage.tsdb.path=/prometheus"
      # - "--storage.tsdb.retention.time=30d"
      # - "--web.enable-lifecycle"

    volumes:
      - prometheus-data:/prometheus

      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

      - ./prometheus/rules:/etc/prometheus/rules:ro

    networks:
      - obs-net

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

    mem_limit: 1g
    cpus: 1


  alloy:

    image: grafana/alloy:${ALLOY_VERSION}

    hostname: alloy

    restart: unless-stopped

    env_file:
      - ./.env

    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy

    ports:
      - "${OTLP_HTTP_PORT}:4318"
      - "${OTLP_GRPC_PORT}:4317"
      - "${ALLOY_UI_PORT}:12345"

    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # - ./alloy:/etc/alloy:ro

      - /var/log:/var/log:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - obs-net
    
    depends_on:
      - prometheus

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:12345/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

    mem_limit: 512m